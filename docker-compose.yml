services:
  sglang:
    # Pinned 2026-06-27 (audit remediation R8). Floating ``latest``
    # tags were the audit's R8 finding. Bump quarterly; see
    # docs/docker-image-pinning.md for the rationale (we prefer
    # minor-version pinning over digest pinning to preserve layered
    # image caching and easy cross-registry promotion).
    #
    # NB: the previous pin (``v0.4.10-cu130-runtime``) never
    # existed on Docker Hub — the v0.4.10 series only ships
    # ``-cu126`` / ``-cu128-{b200,gb200}`` / ``-xeon`` suffixes;
    # ``-cu130-runtime`` only appears from v0.5.13 onward. Bumping
    # to v0.5.14 here so Blackwell (RTX PRO 6000 / RTX 5070, sm_120)
    # can actually run the container.
    image: lmsysorg/sglang:v0.5.14-cu130-runtime
    # Read HF_TOKEN / CUDA / etc. from a local .env file. Copy
    # .env.example to .env and fill in the values; the .env file is
    # gitignored.
    env_file:
      - .env
    ports:
      - "30000:30000"
    volumes:
      # This maps your host cache to the container's default Hugging Face cache path
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '32gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["sh", "-c", "pip install --no-cache-dir distro && pip uninstall -y torchcodec && exec python3 -m sglang.launch_server --model-path Qwen/Qwen3.5-35B-A3B --host 0.0.0.0 --port 30000 --mem-fraction-static 0.9 --attention-backend triton"]
  neo4j:
    # Pinned 2026-06-26 (audit remediation R8). Quarterly review.
    image: neo4j:5.26.0
    env_file:
      - .env
    ports:
      - "7474:7474"
      - "7687:7687"
    # R4: the previous hard-coded ``neo4j/password`` literal is gone.
    # The credentials now come from ``NEO4J_USER`` and
    # ``NEO4J_PASSWORD`` in the .env file (copied from
    # .env.example). The ``:-neo4j`` and ``:-REPLACE_ME`` defaults
    # are dev-only fallbacks; replace them in .env before any
    # non-local use.
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-REPLACE_ME}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs: